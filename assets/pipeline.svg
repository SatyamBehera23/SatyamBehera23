<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="290" viewBox="0 0 1280 290" role="img" aria-labelledby="title desc">
  <title id="title">Animated build pipeline</title>
  <desc id="desc">A technical animated pipeline showing future project tracks with moving signal dots and progress bars.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1724" />
      <stop offset="100%" stop-color="#15263c" />
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#57d0ff" />
      <stop offset="100%" stop-color="#8fffd1" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd166" />
      <stop offset="100%" stop-color="#ff8a4c" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.28" />
    </filter>
    <style>
      .track1 { animation: lift1 6s ease-in-out infinite; }
      .track2 { animation: lift2 6.8s ease-in-out infinite; }
      .track3 { animation: lift3 7.6s ease-in-out infinite; }
      .prog1 { animation: prog1 2.8s ease-in-out infinite; transform-origin: left center; }
      .prog2 { animation: prog2 3.1s ease-in-out infinite; transform-origin: left center; }
      .prog3 { animation: prog3 3.4s ease-in-out infinite; transform-origin: left center; }
      .signal1 { animation: signal1 4s linear infinite; }
      .signal2 { animation: signal2 4.6s linear infinite; }
      .signal3 { animation: signal3 5s linear infinite; }
      @keyframes lift1 {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
      }
      @keyframes lift2 {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-7px); }
      }
      @keyframes lift3 {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }
      @keyframes prog1 {
        0% { transform: scaleX(0.18); }
        50% { transform: scaleX(0.88); }
        100% { transform: scaleX(0.34); }
      }
      @keyframes prog2 {
        0% { transform: scaleX(0.24); }
        50% { transform: scaleX(0.94); }
        100% { transform: scaleX(0.28); }
      }
      @keyframes prog3 {
        0% { transform: scaleX(0.16); }
        50% { transform: scaleX(0.9); }
        100% { transform: scaleX(0.22); }
      }
      @keyframes signal1 {
        0% { transform: translateX(0px); opacity: 0; }
        15% { opacity: 1; }
        85% { opacity: 1; }
        100% { transform: translateX(292px); opacity: 0; }
      }
      @keyframes signal2 {
        0% { transform: translateX(0px); opacity: 0; }
        15% { opacity: 1; }
        85% { opacity: 1; }
        100% { transform: translateX(292px); opacity: 0; }
      }
      @keyframes signal3 {
        0% { transform: translateX(0px); opacity: 0; }
        15% { opacity: 1; }
        85% { opacity: 1; }
        100% { transform: translateX(292px); opacity: 0; }
      }
    </style>
  </defs>

  <rect width="1280" height="290" rx="28" fill="url(#bg)" />

  <text x="54" y="58" font-family="'Trebuchet MS', 'Verdana', sans-serif" font-size="30" font-weight="700" fill="#f6f1e7">Build Pipeline</text>
  <text x="54" y="88" font-family="'Consolas', 'Courier New', monospace" font-size="15" fill="#a6b8c9">Reserved space for projects that will be published later.</text>

  <g transform="translate(54 126)" class="track1">
    <rect x="0" y="0" width="372" height="128" rx="22" fill="#182a42" stroke="#43617e" stroke-width="2" filter="url(#shadow)" />
    <text x="24" y="34" font-family="'Consolas', 'Courier New', monospace" font-size="13" font-weight="700" fill="#57d0ff">track_01</text>
    <text x="24" y="74" font-family="'Trebuchet MS', 'Verdana', sans-serif" font-size="30" font-weight="700" fill="#f6f1e7">python utility</text>
    <text x="24" y="100" font-family="'Consolas', 'Courier New', monospace" font-size="15" fill="#c2cfdb">status: queued</text>
    <line x1="24" y1="114" x2="316" y2="114" stroke="url(#line)" stroke-width="2" opacity="0.35" />
    <circle cx="24" cy="114" r="5" fill="#57d0ff" class="signal1" />
  </g>

  <g transform="translate(454 126)" class="track2">
    <rect x="0" y="0" width="372" height="128" rx="22" fill="#17303c" stroke="#4b7280" stroke-width="2" filter="url(#shadow)" />
    <text x="24" y="34" font-family="'Consolas', 'Courier New', monospace" font-size="13" font-weight="700" fill="#8fffd1">track_02</text>
    <text x="24" y="74" font-family="'Trebuchet MS', 'Verdana', sans-serif" font-size="30" font-weight="700" fill="#f6f1e7">data analysis case study</text>
    <text x="24" y="100" font-family="'Consolas', 'Courier New', monospace" font-size="15" fill="#c2cfdb">status: queued</text>
    <rect x="24" y="110" width="320" height="10" rx="5" fill="#0d1726" />
    <rect x="24" y="110" width="320" height="10" rx="5" fill="url(#line)" class="prog2" />
  </g>

  <g transform="translate(854 126)" class="track3">
    <rect x="0" y="0" width="372" height="128" rx="22" fill="#2d2941" stroke="#72658f" stroke-width="2" filter="url(#shadow)" />
    <text x="24" y="34" font-family="'Consolas', 'Courier New', monospace" font-size="13" font-weight="700" fill="#ffd166">track_03</text>
    <text x="24" y="74" font-family="'Trebuchet MS', 'Verdana', sans-serif" font-size="30" font-weight="700" fill="#f6f1e7">backend mini app</text>
    <text x="24" y="100" font-family="'Consolas', 'Courier New', monospace" font-size="15" fill="#c2cfdb">status: queued</text>
    <rect x="24" y="110" width="320" height="10" rx="5" fill="#0d1726" />
    <rect x="24" y="110" width="320" height="10" rx="5" fill="url(#accent)" class="prog3" />
  </g>
</svg>
